  length:
    min_length: 139
    max_length: 240
  augur_refine:
    coalescent: "opt"
    date_inference: "marginal"
    clock_filter_iqd: 3
    strain_id_field: "accession"
    rooting: "least-squares"

membrane:
  length:
    min_length: 406
    max_length: 700
  augur_refine:
    coalescent: "opt"
    date_inference: "marginal"
    clock_filter_iqd: 3
    strain_id_field: "accession"
